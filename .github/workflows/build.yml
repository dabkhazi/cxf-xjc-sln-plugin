name: Build

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build
        run: mvn -B clean install

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v7
        with:
          name: cxf-xjc-singular-names
          path: sln/target/cxf-xjc-singular-names-*.jar
          if-no-files-found: error
