name: Release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

jobs:
  release:
    name: Build and Publish Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build
        run: mvn -B clean install

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          jar_file="$(ls sln/target/cxf-xjc-singular-names-*.jar | head -n 1)"
          gh release create "${GITHUB_REF_NAME}" "${jar_file}" \
            --verify-tag \
            --title "${GITHUB_REF_NAME}" \
            --notes "Release ${GITHUB_REF_NAME}"
